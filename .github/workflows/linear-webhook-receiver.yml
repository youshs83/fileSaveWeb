name: Linear Webhook Receiver

on:
  repository_dispatch:
    types: [linear-issue-created, linear-issue-updated]

jobs:
  create-github-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create GitHub Issue from Linear
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TITLE="${{ github.event.client_payload.title }}"
          BODY="${{ github.event.client_payload.description }}"
          LINEAR_ID="${{ github.event.client_payload.linear_id }}"

          # GitHub Issue 생성 + auto-fix 라벨 추가
          gh issue create \
            --repo "$REPO" \
            --title "[Linear-${LINEAR_ID}] ${TITLE}" \
            --body "**Linear Issue:** ${LINEAR_ID}

          ${BODY}" \
            --label "auto-fix"
