name: Linear Issue Auto Handler

on:
  issues:
    types: [opened, labeled]
  # Linear webhook을 GitHub Issues로 미러링하거나
  # repository_dispatch로 트리거

jobs:
  analyze-and-fix:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'auto-fix')
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze issue and create fix branch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH_NAME="fix/LIN-${ISSUE_NUMBER}-auto"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH_NAME

          # Claude Code로 이슈 분석 및 수정
          claude --print "
            다음 이슈를 분석하고 수정하세요:
            제목: $ISSUE_TITLE
            내용: $ISSUE_BODY

            1. 관련 파일을 찾아 수정하세요
            2. 테스트를 실행하여 확인하세요
            3. 변경사항을 git add/commit하세요 (커밋 메시지에 'Fixes #$ISSUE_NUMBER' 포함)
          "

          git push origin $BRANCH_NAME

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: fix/LIN-${{ github.event.issue.number }}-auto
          base: develop
          title: "fix: ${{ github.event.issue.title }}"
          body: |
            ## 자동 생성된 PR

            Fixes #${{ github.event.issue.number }}

            ### 변경 사항
            Claude Code가 Linear 이슈를 분석하여 자동 생성한 PR입니다.

            ### 검토 필요 사항
            - [ ] 코드 로직 확인
            - [ ] 테스트 통과 확인
            - [ ] 사이드 이펙트 검토
